# ================================================================
#  nginx.conf – CoreNova Bank Frontend Server Config
#
#  Two responsibilities:
#   1. Serve the React SPA, with a fallback to index.html for
#      client-side routes (/accounts, /loans, /approvals, etc.)
#      — without this, refreshing on /loans would 404.
#   2. Reverse-proxy /api/* requests to the Spring Boot backend
#      container ("backend" is the service name in docker-compose).
# ================================================================

server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression for faster loads ──────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── React Router fallback ───────────────────────────────────
    # Any path not matching a real file falls back to index.html,
    # letting React Router handle the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ───────────────────────────────────────
    # Forwards /api/* to the Spring Boot backend service.
    # "backend" resolves via Docker's internal DNS (docker-compose).
    location /api/ {
        proxy_pass https://corenova-core-banking-system.onrender.com/api/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if added later for live notifications)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Static asset caching ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf)$ {
        expires    7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
