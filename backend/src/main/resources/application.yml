# ================================================================
#  CoreNova Bank – Core Banking System
#  Application Configuration (application.yml)
#  Inspired by Finacle / ICICI iCore architecture
# ================================================================

spring:
  application:
    name: corenova-bank

  # ── PostgreSQL Database ─────────────────────────────────────
  datasource:
    url: jdbc:postgresql://ep-small-lab-aotlucce.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: npg_f9kn3eApoCiS
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: CoreNovaHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update       # use 'validate' in PRODUCTION
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

  # ── Redis Cache ────────────────────────────────────────────
  data:
    redis:
      host: fresh-escargot-133045.upstash.io
      port: 6379
      password: gQAAAAAAAge1AAIgcDJiN2UwMmI2NjUxNTE0NzJmOGIyNmZlZjA4MjExZWQwOA
      ssl:
        enabled: true

  # ── Cache Manager ──────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000   # 10 minutes default TTL

# ── Server Config ─────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ── JWT Configuration ─────────────────────────────────────────
app:
  jwt:
    secret: CoreNovaBankSecretKey2026_ProductionKeyMustBeAtLeast256BitsLong!
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  bank:
    name: CoreNova Bank
    code: CNB
    ifsc-prefix: CNB0
    branch-code: MAIN001
    currency: INR
    timezone: Asia/Kolkata
  transaction:
    max-daily-limit: 1000000        # ₹10 Lakh default daily limit
    upi-limit: 100000               # ₹1 Lakh UPI limit
    rtgs-minimum: 200000            # ₹2 Lakh RTGS minimum

# ── Swagger / OpenAPI ─────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Actuator Health ───────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    com.corenova: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
